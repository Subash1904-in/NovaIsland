name: Nova Island CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore NovaIsland.sln

      - name: Build
        run: dotnet build NovaIsland.sln --configuration ${{ matrix.configuration }} --no-restore

      - name: Run Unit Tests
        run: >
          dotnet test tests/NovaIsland.Tests.Unit/NovaIsland.Tests.Unit.csproj
          --configuration ${{ matrix.configuration }}
          --no-build
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ./test-results/unit
          --collect:"XPlat Code Coverage"

      - name: Run Integration Tests
        run: >
          dotnet test tests/NovaIsland.Tests.Integration/NovaIsland.Tests.Integration.csproj
          --configuration ${{ matrix.configuration }}
          --no-build
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ./test-results/integration

      - name: Run Perf Gate Tests
        run: >
          dotnet test tests/NovaIsland.Tests.Perf/NovaIsland.Tests.Perf.csproj
          --configuration ${{ matrix.configuration }}
          --no-build
          --logger "trx;LogFileName=perf-results.trx"
          --results-directory ./test-results/perf

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.configuration }}
          path: ./test-results/
          retention-days: 30

  perf-gate:
    name: Performance Gate (dotnet-trace)
    runs-on: windows-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dotnet-trace
        run: dotnet tool install --global dotnet-trace

      - name: Install dotnet-counters
        run: dotnet tool install --global dotnet-counters

      - name: Build Release
        run: dotnet build NovaIsland.sln --configuration Release

      - name: Perf Gate — Placeholder Trace Collection
        run: |
          Write-Host "============================================"
          Write-Host "  PERF GATE — Placeholder"
          Write-Host "============================================"
          Write-Host ""
          Write-Host "dotnet-trace version:"
          dotnet-trace --version
          Write-Host ""
          Write-Host "dotnet-counters version:"
          dotnet-counters --version
          Write-Host ""
          Write-Host "Performance gate toolchain verified."
          Write-Host "Actual trace collection and threshold validation"
          Write-Host "will be implemented in Phase 8 (Performance Hardening)."
          Write-Host ""
          Write-Host "Targets (SRS section 10):"
          Write-Host "  - RAM idle: < 40 MB"
          Write-Host "  - CPU idle: < 0.2%"
          Write-Host "  - Cold startup: < 300 ms"
          Write-Host "  - Warm startup: < 100 ms (AOT)"
          Write-Host "  - Animation: 120 FPS, p99 frame-time < 8.3 ms @120Hz"
          Write-Host ""
          Write-Host "PERF GATE: PASS (placeholder)"

      - name: Upload Perf Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-gate-results
          path: |
            *.nettrace
            *.csv
          retention-days: 30
          if-no-files-found: ignore

  aot-validation:
    name: Native AOT Validation
    runs-on: windows-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish with Native AOT
        run: >
          dotnet publish src/NovaIsland.App/NovaIsland.App.csproj
          --configuration Release
          --runtime win-x64
          -p:PublishAot=true
          -p:PublishTrimmed=true
          -p:InvariantGlobalization=true
        continue-on-error: true

      - name: Report AOT Result
        run: |
          $aotBinary = "src/NovaIsland.App/bin/Release/net9.0-windows10.0.22621.0/win-x64/publish/NovaIsland.App.exe"
          if (Test-Path $aotBinary) {
            $size = (Get-Item $aotBinary).Length / 1MB
            Write-Host "AOT compilation SUCCEEDED"
            Write-Host "Binary size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "AOT compilation produced warnings or failed."
            Write-Host "Check build output for trim/AOT compatibility issues."
            Write-Host "Fallback: ReadyToRun compilation will be used."
          }
